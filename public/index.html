<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Finance Tracker - Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="auth-style.css" />
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo">COINEST</div>
        <p>Manage your finances with ease</p>
      </div>

      <!-- Login Form -->
      <div class="auth-form" id="login-form">
        <h2>Login</h2>
        <form id="login-input">
          <input type="text" id="login-username" placeholder="Username" required />
          <input type="password" id="login-password" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>
        <p class="form-switch">
          Don't have an account? <a href="#" onclick="switchForm()">Sign Up</a>
        </p>
      </div>

      <!-- Sign Up Form -->
      <div class="auth-form" id="signup-form" style="display: none;">
        <h2>Sign Up</h2>
        <form id="signup-input">
          <input type="text" id="signup-username" placeholder="Username" required />
          <input type="email" id="signup-email" placeholder="Email" required />
          <input type="password" id="signup-password" placeholder="Password" required />
          <input type="password" id="signup-confirm-password" placeholder="Confirm Password" required />
          <button type="submit">Sign Up</button>
        </form>
        <p class="form-switch">
          Already have an account? <a href="#" onclick="switchForm()">Login</a>
        </p>
      </div>

      <div id="error-message" class="error-message"></div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>

</html>
