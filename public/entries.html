<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Entries - Personal Finance Tracker</title>
  <link rel="stylesheet" href="mCss.css">
  <style>
    .table-card {
      margin-bottom: 25px;
      overflow-x: auto;
    }

    .table-card h3 {
      margin-bottom: 15px;
      font-size: 16px;
      color: #1a1a1a;
      border-bottom: 1px solid #eef2f0;
      padding-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="dashboard-layout">

    <!-- Sidebar -->
    <aside class="sidebar">

      <div>
        <div class="logo">COINEST</div>

        <nav class="menu">
          <a href="dashboard.html">Dashboard</a>
          <a href="payments.html">Payments</a>
          <a href="entries.html" class="active">Transactions</a>
          <a href="add-entry.html">Add Entry</a>
        </nav>
      </div>

      <div>
        <div class="promo-card" style="margin-bottom: 20px;">
          <p>Gain full access to your finances with detailed analytics and graphs.</p>
          <button>Go Pro</button>
        </div>
        <button class="logout-btn-side" onclick="logout()">Logout</button>
      </div>

    </aside>

    <!-- Main Content -->
    <main class="main">

      <!-- Header -->
      <header class="header">
        <h1>All Transactions</h1>

        <div class="header-right-container">
          <input class="search" type="text" placeholder="Search placeholder">

          <div class="header-actions">
            <span class="icon">◎</span>
            <span class="icon">🔔</span>
            <div class="profile">
              <span id="user-greeting">Loading...</span>
              <img src="https://i.pravatar.cc/40" alt="">
            </div>
          </div>
        </div>
      </header>

      <!-- Entries Section -->
      <section>

        <div class="card table-card">
          <h3>Income</h3>
          <table id="income-table" style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
              <tr style="border-bottom: 1px solid #eef2f0; color: #a0aab2; font-size: 13px;">
                <th style="padding: 12px 10px; font-weight: 600;">ID</th>
                <th style="padding: 12px 10px; font-weight: 600;">Amount</th>
                <th style="padding: 12px 10px; font-weight: 600;">Source</th>
                <th style="padding: 12px 10px; font-weight: 600;">Date</th>
                <th style="padding: 12px 10px; font-weight: 600;">Action</th>
              </tr>
            </thead>
            <tbody style="font-size: 14px;"></tbody>
          </table>
        </div>

        <div class="card table-card">
          <h3>Expenses</h3>
          <table id="expenses-table" style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
              <tr style="border-bottom: 1px solid #eef2f0; color: #a0aab2; font-size: 13px;">
                <th style="padding: 12px 10px; font-weight: 600;">ID</th>
                <th style="padding: 12px 10px; font-weight: 600;">Amount</th>
                <th style="padding: 12px 10px; font-weight: 600;">Category</th>
                <th style="padding: 12px 10px; font-weight: 600;">Date</th>
                <th style="padding: 12px 10px; font-weight: 600;">Action</th>
              </tr>
            </thead>
            <tbody style="font-size: 14px;"></tbody>
          </table>
        </div>

        <div class="card table-card">
          <h3>Debts</h3>
          <table id="debts-table" style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
              <tr style="border-bottom: 1px solid #eef2f0; color: #a0aab2; font-size: 13px;">
                <th style="padding: 12px 10px; font-weight: 600;">ID</th>
                <th style="padding: 12px 10px; font-weight: 600;">Amount</th>
                <th style="padding: 12px 10px; font-weight: 600;">Creditor</th>
                <th style="padding: 12px 10px; font-weight: 600;">Due Date</th>
                <th style="padding: 12px 10px; font-weight: 600;">Action</th>
              </tr>
            </thead>
            <tbody style="font-size: 14px;"></tbody>
          </table>
        </div>

      </section>

    </main>

  </div>

  <script src="app.js"></script>
</body>

</html>
