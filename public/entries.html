<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Entries - Personal Finance Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1>Personal Finance Tracker</h1>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <nav class="navbar">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="add-entry.html" class="nav-link">Add Entry</a>
    <a href="income.html" class="nav-link">Income</a>
    <a href="expenses.html" class="nav-link">Expenses</a>
    <a href="debts.html" class="nav-link">Debts</a>
  </nav>

  <main class="container">
    <section class="entries">
      <h2>All Entries</h2>
      <div id="entries-container">
        <h3>Income</h3>
        <table id="income-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Amount</th>
              <th>Source</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <h3>Expenses</h3>
        <table id="expenses-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Amount</th>
              <th>Category</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <h3>Debts</h3>
        <table id="debts-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Amount</th>
              <th>Creditor</th>
              <th>Due Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
