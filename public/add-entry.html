<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Entry - Personal Finance Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1>Personal Finance Tracker</h1>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <nav class="navbar">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="add-entry.html" class="nav-link active">Add Entry</a>
    <a href="entries.html" class="nav-link">All Entries</a>
  </nav>

  <main class="container">
    <section class="forms">
      <h2>Add New Entry</h2>
      
      <!-- Balance warning section -->
      <div id="balance-info" class="balance-info">
        <p>Current Balance: <span id="current-balance" class="balance-amount">₹0</span></p>
        <p id="balance-warning" class="balance-warning" style="display: none;">
          ⚠️ Your balance is negative. You cannot add expenses until your balance is positive.
        </p>
      </div>
      
      <form id="entry-form">
        <select id="entry-type" required>
          <option value="income">Income</option>
          <option value="expenses">Expense</option>
          <option value="debts">Debt</option>
        </select>
        <input type="number" id="amount" placeholder="Amount" step="0.01" required />
        <input type="text" id="detail" placeholder="Source / Category / Creditor" required />
        <input type="date" id="date" required />
        <button type="submit">Add Entry</button>
      </form>
      <div id="success-message" class="success-message"></div>
    </section>
  </main>

  <script>
    // Fetch current balance on page load
    async function loadBalance() {
      try {
        const res = await fetch('/api/summary', {
          headers: getAuthHeader()
        });
        const data = await res.json();
        window.currentBalance = data.balance || 0;
        
        const balanceElement = document.getElementById('current-balance');
        balanceElement.textContent = formatCurrency(data.balance || 0);
        
        // Update balance warning
        const warningElement = document.getElementById('balance-warning');
        if (data.balance < 0) {
          balanceElement.parentElement.style.color = '#ff6666';
          warningElement.style.display = 'block';
        } else {
          balanceElement.parentElement.style.color = '#99ff99';
          warningElement.style.display = 'none';
        }
      } catch (e) {
        console.error('Failed to load balance', e);
      }
    }
    
    // Load balance when page loads
    document.addEventListener('DOMContentLoaded', () => {
      loadBalance();
    });
  </script>
  <script src="app.js"></script>
</body>
</html>
