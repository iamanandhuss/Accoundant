<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Personal Finance Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1>Personal Finance Tracker</h1>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <nav class="navbar">
    <a href="dashboard.html" class="nav-link active">Dashboard</a>
    <a href="add-entry.html" class="nav-link">Add Entry</a>
    <a href="entries.html" class="nav-link">All Entries</a>
  </nav>

  <main class="container">
    <section class="dashboard">
      <div class="card" id="total-income">
        <h2>Total Income</h2>
        <p class="value" data-type="income">₹0</p>
      </div>
      <div class="card" id="total-expenses">
        <h2>Total Expenses</h2>
        <p class="value" data-type="expenses">₹0</p>
      </div>
      <div class="card" id="total-debts">
        <h2>Total Debts</h2>
        <p class="value" data-type="debts">₹0</p>
      </div>
      <div class="card" id="net-balance">
        <h2>Net Balance</h2>
        <p class="value" id="net-balance-value">₹0</p>
      </div>
      <canvas id="summary-chart" width="400" height="200"></canvas>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
